<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智慧找書系統</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        /* 自訂霓虹與微光效果 */
        .neon-glow {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        
        .neon-border {
            position: relative;
        }
        .neon-border::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1rem;
            padding: 1px;
            background: linear-gradient(to bottom right, #6366f1, #a855f7, transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* 卡片登場動畫 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }

        /* 骨架屏閃爍動畫 */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 37%, #1e293b 63%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite linear;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col justify-between p-4 md:p-8">

    <!-- 主容器 -->
    <main class="max-w-4xl w-full mx-auto flex-grow flex flex-col justify-start pt-10 pb-16">
        
        <!-- 標題區域 -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-2 bg-indigo-500/10 text-indigo-300 px-4 py-1.5 rounded-full text-xs font-semibold mb-3 border border-indigo-500/20 tracking-wider">
                <svg class="w-4 h-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                Semantic Book Search
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white via-indigo-200 to-purple-400 tracking-tight">
                AI 智慧找書系統
            </h1>
            <p class="text-slate-400 mt-3 text-sm md:text-base max-w-lg mx-auto">
                用日常口語、閱讀情境或模糊需求告訴我，AI 將立即為您推薦館藏中最合適的書籍！
            </p>
        </div>

        <!-- 查詢輸入框卡片 -->
        <div class="bg-slate-800/50 backdrop-blur-md rounded-2xl p-6 mb-8 border border-slate-700/50 neon-glow neon-border">
            <form id="searchForm" class="space-y-4">
                <div class="relative">
                    <textarea 
                        id="queryInput" 
                        rows="3" 
                        class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 pl-4 pr-12 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all resize-none text-base"
                        placeholder="例如：我想找一些跟精釀啤酒有關的書，最好是有介紹釀造原理或是精美插圖的..."
                        maxlength="500"
                        required></textarea>
                    
                    <div class="absolute bottom-3 right-3 text-xs text-slate-500" id="charCounter">
                        0 / 500
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                    <!-- 推薦提示詞 -->
                    <div class="flex flex-wrap gap-2 justify-start items-center w-full sm:w-auto">
                        <span class="text-xs text-slate-400">試試這些：</span>
                        <button type="button" class="sample-btn text-xs bg-slate-700/50 hover:bg-slate-700 text-slate-300 px-3 py-1 rounded-full transition-all border border-slate-600/30">
                            🍺 介紹啤酒入門與漫畫
                        </button>
                        <button type="button" class="sample-btn text-xs bg-slate-700/50 hover:bg-slate-700 text-slate-300 px-3 py-1 rounded-full transition-all border border-slate-600/30">
                            🤖 人工智慧與未來科技
                        </button>
                    </div>

                    <!-- 送出按鈕 -->
                    <button 
                        type="submit" 
                        id="submitBtn"
                        class="w-full sm:w-auto px-6 py-3 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-medium rounded-xl transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/20 active:scale-[0.98]">
                        <svg id="btnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <span>開始智慧搜尋</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- 錯誤提示區域 (預設隱藏) -->
        <div id="errorBox" class="hidden animate-fade-in-up bg-red-500/10 border border-red-500/30 text-red-200 rounded-xl p-4 mb-8 flex items-start gap-3">
            <svg class="w-6 h-6 text-red-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <div>
                <h3 class="font-bold text-sm" id="errorTitle">搜尋失敗</h3>
                <p class="text-xs text-red-300/90 mt-1" id="errorMessage">錯誤說明</p>
            </div>
        </div>

        <!-- 骨架屏載入動畫 (預設隱藏) -->
        <div id="skeletonLoader" class="hidden space-y-4">
            <div class="text-center py-4 text-slate-400 text-sm flex items-center justify-center gap-3">
                <svg class="animate-spin h-5 w-5 text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                AI 正在閱讀並語意檢索中，請稍候...
            </div>
            <!-- 三組骨架卡片 -->
            <div class="grid gap-4 md:grid-cols-1">
                <div class="bg-slate-800/30 rounded-xl p-5 border border-slate-700/30 space-y-3">
                    <div class="h-6 skeleton rounded w-2/3"></div>
                    <div class="h-4 skeleton rounded w-1/3"></div>
                    <div class="h-16 skeleton rounded w-full"></div>
                </div>
                <div class="bg-slate-800/30 rounded-xl p-5 border border-slate-700/30 space-y-3">
                    <div class="h-6 skeleton rounded w-1/2"></div>
                    <div class="h-4 skeleton rounded w-1/4"></div>
                    <div class="h-16 skeleton rounded w-full"></div>
                </div>
            </div>
        </div>

        <!-- 結果呈現區域 -->
        <div id="resultsWrapper" class="space-y-4">
            <!-- 動態插入的書籍卡片 -->
            <div id="resultsList" class="grid gap-6 md:grid-cols-1">
                <!-- 預設歡迎插圖/提示 -->
                <div class="text-center py-16 text-slate-500">
                    <svg class="w-16 h-16 mx-auto mb-4 stroke-1 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    <p class="text-sm">在上方輸入你想尋找的內容，讓我為你展開書本的秘密。</p>
                </div>
            </div>
        </div>

    </main>

    <!-- 頁尾 -->
    <footer class="text-center text-slate-600 text-xs py-4 border-t border-slate-800/50 mt-12">
        <p>© 2026 AI 智慧館藏檢索系統 - Koha 整合模組</p>
    </footer>

    <!-- 邏輯腳本 -->
    <script>
        $(document).ready(function() {
            const $form = $('#searchForm');
            const $queryInput = $('#queryInput');
            const $submitBtn = $('#submitBtn');
            const $charCounter = $('#charCounter');
            const $errorBox = $('#errorBox');
            const $errorTitle = $('#errorTitle');
            const $errorMessage = $('#errorMessage');
            const $skeletonLoader = $('#skeletonLoader');
            const $resultsList = $('#resultsList');

            // 預設提示詞點擊事件
            $('.sample-btn').on('click', function() {
                const sampleText = $(this).text().trim().substring(2); // 去掉表情符號
                $queryInput.val(sampleText).trigger('input');
            });

            // 即時字數計算
            $queryInput.on('input', function() {
                const len = $(this).val().length;
                $charCounter.text(`${len} / 500`);
                if (len > 450) {
                    $charCounter.removeClass('text-slate-500').addClass('text-yellow-500');
                } else {
                    $charCounter.removeClass('text-yellow-500').addClass('text-slate-500');
                }
            });

            // 提交表單處理
            $form.on('submit', function(e) {
                e.preventDefault();

                const queryVal = $queryInput.val().trim();
                if (!queryVal) return;

                // 1. 初始化 UI 狀態
                $errorBox.addClass('hidden');
                $resultsList.empty();
                $skeletonLoader.removeClass('hidden');
                setLoadingState(true);

                // 2. 發送 AJAX 請求
                $.ajax({
                    url: 'https://20260612.zeabur.app/api/search',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ query: queryVal }),
                    dataType: 'json',
                    success: function(data) {
                        renderResults(data);
                    },
                    error: function(xhr, status, error) {
                        handleError(xhr);
                    },
                    complete: function() {
                        $skeletonLoader.addClass('hidden');
                        setLoadingState(false);
                    }
                });
            });

            // 載入狀態控制
            function setLoadingState(isLoading) {
                if (isLoading) {
                    $submitBtn.prop('disabled', true).addClass('opacity-50 cursor-not-allowed');
                    $queryInput.prop('disabled', true);
                } else {
                    $submitBtn.prop('disabled', false).removeClass('opacity-50 cursor-not-allowed');
                    $queryInput.prop('disabled', false);
                }
            }

            // 錯誤處理邏輯
            function handleError(xhr) {
                let title = "搜尋服務暫時無法運作";
                let msg = "請檢查您的網路連線，或稍後再試一次。";

                // 根據 status code 分析錯誤
                switch (xhr.status) {
                    case 400:
                        title = "無效的查詢 (錯誤碼：400)";
                        // 如果 API 回傳格式中有詳細的錯誤碼，可以解出來
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            msg = `伺服器回應：${xhr.responseJSON.message}。請確認您輸入的文字是否正確或填寫了空內容。`;
                        } else {
                            msg = "請確認您輸入的字詞是否有效，並重新輸入後再試一次。";
                        }
                        break;
                    case 413:
                        title = "輸入字數過長 (錯誤碼：413)";
                        msg = "您輸入的文字長度超出了伺服器處理範圍，請精簡或縮短您的描述語句後再試。";
                        break;
                    case 429:
                        title = "請求過於頻繁 (錯誤碼：429)";
                        msg = "您已達到搜尋的速率限制。系統目前非常繁忙，請稍候 1~2 分鐘後重新整理再試一次。";
                        break;
                    default:
                        title = `連線異常 (${xhr.status || '連線逾時'})`;
                        msg = "發生了未知的伺服器錯誤，請稍候或聯絡系統管理員。";
                        break;
                }

                $errorTitle.text(title);
                $errorMessage.text(msg);
                $errorBox.removeClass('hidden');
                
                // 補回一個無結果的狀態在列表中
                $resultsList.html(`
                    <div class="text-center py-12 text-slate-600">
                        <svg class="w-12 h-12 mx-auto mb-3 text-red-500/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="text-sm">很抱歉，因為上述錯誤，目前無法為您取得推薦結果。</p>
                    </div>
                `);
            }

            // 渲染成功結果
            function renderResults(books) {
                if (!Array.isArray(books) || books.length === 0) {
                    $resultsList.html(`
                        <div class="text-center py-16 text-slate-500 animate-fade-in-up">
                            <svg class="w-16 h-16 mx-auto mb-4 stroke-1 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <p class="text-sm">找不到符合條件的書籍。建議試試其他更寬廣的描述詞！</p>
                        </div>
                    `);
                    return;
                }

                let htmlContent = '';
                books.forEach((book, index) => {
                    // 安全欄位容錯
                    const id = book.id || '';
                    const title = book.title || '未命名書籍';
                    const authors = book.authors || '佚名';
                    const isbn = book.isbn || '無登錄';
                    const llmMsg = book.llm_msg || '無 AI 推薦原因說明。';
                    const scoreVal = book.score !== undefined ? parseFloat(book.score) : 0;
                    
                    // 百分比格式化
                    const percentage = Math.round(scoreVal * 100);
                    // Koha 連結
                    const kohaLink = `http://ds-3.koha.com.tw/cgi-bin/koha/opac-detail.pl?biblionumber=${id}`;

                    // 分數色彩：極高(>=80% 翡翠), 中等(>=60% 藍紫), 普通(<60% 琥珀)
                    let scoreColor = 'from-amber-400 to-orange-500';
                    let scoreBg = 'bg-amber-500/10 text-amber-400 border-amber-500/20';
                    if (percentage >= 80) {
                        scoreColor = 'from-emerald-400 to-teal-500';
                        scoreBg = 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20';
                    } else if (percentage >= 60) {
                        scoreColor = 'from-indigo-400 to-purple-500';
                        scoreBg = 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20';
                    }

                    // 延遲動畫秒數
                    const delay = index * 0.1;

                    htmlContent += `
                        <div class="bg-slate-800/40 rounded-xl p-6 border border-slate-700/40 hover:border-slate-600/60 transition-all duration-300 animate-fade-in-up flex flex-col md:flex-row justify-between gap-6" style="animation-delay: ${delay}s">
                            <!-- 左側書籍與推薦內容 -->
                            <div class="flex-grow space-y-4">
                                <div>
                                    <div class="flex flex-wrap items-center gap-2 mb-2">
                                        <!-- Score Badge -->
                                        <span class="inline-flex items-center text-xs px-2.5 py-0.5 rounded-full font-bold border ${scoreBg}">
                                            AI 匹配度 ${percentage}%
                                        </span>
                                        <span class="text-xs text-slate-500">ID: ${id}</span>
                                    </div>
                                    <h2 class="text-xl font-bold text-white group-hover:text-indigo-400 transition-colors">
                                        ${title}
                                    </h2>
                                </div>

                                <!-- 書籍屬性 (作者/ISBN) -->
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm text-slate-400">
                                    <div class="flex items-center gap-2">
                                        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                        <span>作者：<span class="text-slate-300 font-medium">${authors}</span></span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path></svg>
                                        <span>ISBN：<span class="text-slate-300 font-mono">${isbn}</span></span>
                                    </div>
                                </div>

                                <!-- LLM 推薦原因說明 -->
                                <div class="bg-slate-900/40 rounded-lg p-4 border-l-4 border-indigo-500">
                                    <p class="text-sm leading-relaxed text-slate-300">
                                        <span class="font-bold text-indigo-400 text-xs block mb-1 uppercase tracking-wider">AI 推薦觀點</span>
                                        ${llmMsg}
                                    </p>
                                </div>
                            </div>

                            <!-- 右側關聯動作 (評分條與按鈕) -->
                            <div class="flex flex-col justify-between items-stretch md:items-end w-full md:w-52 shrink-0 border-t md:border-t-0 md:border-l border-slate-700/50 pt-4 md:pt-0 md:pl-6">
                                <!-- 評分長條圖 -->
                                <div class="space-y-1 mb-4 w-full">
                                    <div class="flex justify-between text-xs text-slate-400">
                                        <span>推薦強度</span>
                                        <span class="font-mono text-slate-300">${scoreVal}</span>
                                    </div>
                                    <div class="w-full bg-slate-900 rounded-full h-1.5 overflow-hidden">
                                        <div class="bg-gradient-to-r ${scoreColor} h-1.5 rounded-full" style="width: ${percentage}%"></div>
                                    </div>
                                </div>

                                <!-- 館藏連結按鈕 -->
                                <a 
                                    href="${kohaLink}" 
                                    target="_blank" 
                                    rel="noopener noreferrer" 
                                    class="w-full text-center px-4 py-2.5 bg-slate-700 hover:bg-indigo-600 text-slate-100 hover:text-white text-sm font-medium rounded-lg transition-all duration-300 flex items-center justify-center gap-2 border border-slate-600 hover:border-indigo-500 hover:shadow-lg hover:shadow-indigo-500/10">
                                    <span>前往館藏詳細頁</span>
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                </a>
                            </div>
                        </div>
                    `;
                });

                $resultsList.html(htmlContent);
            }
        });
    </script>
</body>
</html>
