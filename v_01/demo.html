<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8">
    <title>HZ Search</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px
        }

        form {
            display: flex;
            gap: 8px
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 16px
        }

        button {
            padding: 10px 16px
        }

        .item {
            border-bottom: 1px solid #ddd;
            padding: 12px 0
        }

        small {
            color: #666
        }

        #msg {
            margin: 16px 0;
            color: #666
        }
    </style>
</head>

<body>

    <h2>HZ Search</h2>

    <form>
        <input id="q" placeholder="請輸入查詢文字">
        <button>往HZ搜尋</button>
    </form>

    <div id="msg"></div>
    <div id="list"></div>

    <script>
        $("form").on("submit", function (e) {
            e.preventDefault();

            let query = $("#q").val().trim();
            if (!query) return;

            $("#msg").text("搜尋中...");
            $("#list").empty();

            $.ajax({
                url: "https://20260612.zeabur.app/api/search",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify({ query }),
                success: function (data) {
                    let r = data.results || [];
                    $("#msg").text(r.length ? `共 ${r.length} 筆結果` : "查無結果");

                    r.forEach(x => $("#list").append(`
                <div class="item">
                    <b>${x.title}</b><br>
                    <p>${x.llm_msg}</p><br>
                    <small>作者：${x.authors || "-"}｜ISBN：${x.isbn || "-"}｜分數：${x.score}</small>
                </div>
            `));
                },
                error: function (xhr, status, errorThrown) {
                    let errorMsg = "發生未知錯誤，請稍後再試。";

                    // 情況 1：xhr.status 為 0，代表連線根本沒建立（伺服器真的沒開、網址打錯或網路斷線）
                    if (xhr.status === 0) {
                        errorMsg = "API 連線失敗，請確認伺服器是否已啟動，或網路連線是否正常。";
                    }

                    // 情況 2：伺服器有回應，且有回傳我們在 Flask 定義的 JSON 錯誤訊息
                    else if (xhr.responseJSON) {
                        if (xhr.responseJSON.message) {
                            // 如果後端有寫清楚的 message（例如 429 的 "請求太頻繁，請稍後再試"）
                            errorMsg = xhr.responseJSON.message;
                        } else if (xhr.responseJSON.error) {
                            // 如果後端只有給 error 代碼（例如 413 的 "query_too_long"）
                            switch (xhr.responseJSON.error) {
                                case "query_too_long":
                                    errorMsg = "搜尋字數過長，請縮短至 50 字以內再試。";
                                    break;
                                case "missing_query":
                                    errorMsg = "請輸入搜尋關鍵字，欄位不可為空。";
                                    break;
                                default:
                                    errorMsg = "系統錯誤 (代碼: " + xhr.responseJSON.error + ")";
                            }
                        }
                    }

                    // 情況 3：伺服器有回應錯誤碼，但沒有提供 JSON 內容（備用防線）
                    else {
                        if (xhr.status === 429) {
                            errorMsg = "您點擊得太快了，請稍等一分鐘再試。";
                        } else if (xhr.status === 413) {
                            errorMsg = "傳送的內容體積過大，已被伺服器拒絕。";
                        } else if (xhr.status === 500) {
                            errorMsg = "伺服器內部發生錯誤（500），請聯絡管理員。";
                        } else {
                            errorMsg = "伺服器回應錯誤 (狀態碼: " + xhr.status + ")";
                        }
                    }

                    // 1. 將友善的提示文字顯示在畫面上給使用者看
                    $("#msg").text(errorMsg);

                    // 2. 同時在瀏覽器 Console 印出詳細資訊，方便你自己 debug
                    console.error("【API 錯誤紀錄】");
                    console.error("狀態碼:", xhr.status);
                    console.error("錯誤原因:", errorThrown);
                    console.error("後端回傳內容:", xhr.responseText);
                }
            });
        });
    </script>

</body>

</html>
